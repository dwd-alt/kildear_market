{% extends "base.html" %}

{% block title %}Kildear - Ошибка сервера{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <i class="fas fa-exclamation-triangle fa-5x text-danger mb-4"></i>
        <h1 class="h3 mb-4">Что-то пошло не так</h1>
        <p class="text-muted mb-4">
            На сервере произошла ошибка. Мы уже работаем над её исправлением.
        </p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>На главную
            </a>
            <button onclick="reportError()" class="btn btn-outline-danger">
                <i class="fas fa-bug me-2"></i>Сообщить об ошибке
            </button>
        </div>
    </div>
</div>

<script>
function reportError() {
    Kildear.showNotification('Спасибо! Мы получили информацию об ошибке', 'success');
}
</script>
{% endblock %}
