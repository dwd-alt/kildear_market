{% extends "base.html" %}

{% block title %}Kildear - Подтверждение email{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="fas fa-envelope-open-text fa-4x text-primary"></i>
                </div>

                <h2 class="h4 mb-3">Подтвердите ваш email</h2>

                <p class="text-muted mb-4">
                    Мы отправили код подтверждения на <strong>{{ email }}</strong>.<br>
                    Введите его ниже:
                </p>

                <form method="POST" action="{{ url_for('verify') }}" id="verifyForm">
                    <div class="mb-4">
                        <input type="text" class="form-control form-control-lg text-center"
                               id="code" name="code" required maxlength="6"
                               placeholder="000000" pattern="[0-9]{6}">
                        <div class="form-text">Код действителен 10 минут</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                        <i class="fas fa-check me-2"></i>Подтвердить
                    </button>
                </form>

                <div class="mt-4">
                    <p class="small text-muted mb-2">Не получили код?</p>
                    <button class="btn btn-link text-decoration-none" id="resendCode">
                        Отправить снова
                    </button>
                </div>

                <!-- Таймер -->
                <div class="mt-3 timer text-muted small">
                    <i class="fas fa-clock me-1"></i>
                    <span id="timer">10:00</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    // Таймер
    let timeLeft = 600; // 10 минут в секундах

    function updateTimer() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        $('#timer').text(`${minutes}:${seconds.toString().padStart(2, '0')}`);

        if (timeLeft > 0) {
            timeLeft--;
        } else {
            $('#timer').text('00:00');
            $('#resendCode').prop('disabled', false);
        }
    }

    setInterval(updateTimer, 1000);

    // Повторная отправка кода
    $('#resendCode').on('click', function() {
        $(this).prop('disabled', true).text('Отправка...');

        $.ajax({
            url: '{{ url_for("resend_code") }}',
            method: 'GET',
            success: function() {
                Kildear.showNotification('Новый код отправлен на вашу почту', 'success');
                timeLeft = 600; // Сброс таймера
                $('#resendCode').prop('disabled', false).text('Отправить снова');
            },
            error: function() {
                Kildear.showNotification('Ошибка при отправке кода', 'danger');
                $('#resendCode').prop('disabled', false).text('Отправить снова');
            }
        });
    });

    // Автоматическая отправка формы при вводе 6 цифр
    $('#code').on('input', function() {
        if ($(this).val().length === 6) {
            $('#verifyForm').submit();
        }
    });
});
</script>
{% endblock %}
