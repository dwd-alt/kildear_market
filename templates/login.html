{% extends "base.html" %}

{% block title %}Kildear - Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <span class="brand-gradient">kildear.</span>
                    <h2 class="h4 mt-3">Вход в аккаунт</h2>
                </div>

                <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="your@email.com">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required
                               placeholder="••••••••">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Запомнить меня</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти
                    </button>

                    <div class="text-center">
                        <a href="{{ url_for('register') }}" class="text-decoration-none">
                            Нет аккаунта? Зарегистрируйтесь
                        </a>
                    </div>

                    <hr class="my-4">

                    <div class="text-center text-muted small">
                        <a href="#" class="text-decoration-none">Забыли пароль?</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Безопасность -->
        <div class="card mt-4 border-0 bg-light">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <i class="fas fa-shield-alt fa-2x text-primary me-3"></i>
                    <div>
                        <h6 class="mb-1">Безопасный вход</h6>
                        <p class="small text-muted mb-0">
                            2FA защита • Шифрование данных • Защита от брутфорса
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    $('#loginForm').on('submit', function(e) {
        e.preventDefault();

        if (!Kildear.validateForm('#loginForm')) {
            return;
        }

        $.ajax({
            url: $(this).attr('action'),
            method: 'POST',
            data: $(this).serialize(),
            success: function(response) {
                if (response.redirect) {
                    window.location.href = response.redirect;
                } else {
                    window.location.href = '/';
                }
            },
            error: function(xhr) {
                const response = xhr.responseJSON;
                Kildear.showNotification(response.error || 'Ошибка входа', 'danger');
            }
        });
    });
});
</script>
{% endblock %}
