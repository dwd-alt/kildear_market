{% extends "base.html" %}

{% block title %}Слишком много запросов{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-75 align-items-center">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="error-page py-5">
            <div class="error-icon mb-4">
                <i class="fas fa-hourglass-half fa-5x text-info"></i>
                <h1 class="display-1 fw-bold text-info mt-3">429</h1>
            </div>

            <h2 class="fw-bold mb-3">Слишком много запросов</h2>
            <p class="lead text-muted mb-4">
                Вы превысили лимит запросов. Пожалуйста, подождите немного перед следующим действием.
            </p>

            <div class="wait-timer mb-4">
                <div class="h4 mb-2">Подождите <span id="countdown">{{ retry_after }}</span> секунд</div>
                <div class="progress" style="height: 10px;">
                    <div class="progress-bar bg-info" id="progressBar" role="progressbar" style="width: 100%"></div>
                </div>
            </div>

            <div class="action-buttons">
                <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-5 py-3">
                    <i class="fas fa-home me-2"></i>На главную
                </a>
            </div>
        </div>
    </div>
</div>

<script>
let timeLeft = {{ retry_after|default(60) }};
const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progressBar');
const totalTime = timeLeft;

const timer = setInterval(() => {
    timeLeft--;
    countdownEl.textContent = timeLeft;

    const percentage = (timeLeft / totalTime) * 100;
    progressBar.style.width = percentage + '%';

    if(timeLeft <= 0) {
        clearInterval(timer);
        location.reload();
    }
}, 1000);
</script>
{% endblock %}
